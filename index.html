<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>judyboon AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        
        * { box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; background-color: #0b0f19; color: white; overflow: hidden; margin: 0; padding: 0; }
        
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar slide on mobile */
        #sidebar {
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        /* Markdown formatting */
        .msg-content b, .msg-content strong { color: #f472b6; font-weight: 600; }
        .msg-content i, .msg-content em { color: #c084fc; font-style: italic; }
        .msg-content code {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 1px 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #7dd3fc;
        }
        .msg-content pre {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 14px 16px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .msg-content pre code {
            background: transparent;
            border: none;
            padding: 0;
            color: #e2e8f0;
            font-size: 0.82em;
        }
        .msg-content ul { list-style: disc; padding-left: 20px; margin: 6px 0; }
        .msg-content ol { list-style: decimal; padding-left: 20px; margin: 6px 0; }
        .msg-content li { margin: 3px 0; line-height: 1.6; }
        .msg-content h1, .msg-content h2, .msg-content h3 {
            font-weight: 600;
            margin: 10px 0 4px;
            color: #e2e8f0;
        }
        .msg-content h1 { font-size: 1.2em; }
        .msg-content h2 { font-size: 1.1em; }
        .msg-content h3 { font-size: 1em; color: #c084fc; }
        .msg-content a { color: #818cf8; text-decoration: underline; }
        .msg-content blockquote {
            border-left: 3px solid #6d28d9;
            padding-left: 12px;
            margin: 6px 0;
            color: #94a3b8;
        }
        .msg-content hr { border: none; border-top: 1px solid #1e293b; margin: 10px 0; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative overflow-hidden">

<div id="app-container" class="flex-1 flex overflow-hidden h-screen">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 flex-shrink-0 bg-[#0c101a] border-r border-gray-800/80 flex flex-col fixed md:relative z-40 h-full -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-800/50">
            <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-purple-600/20 to-pink-600/20 hover:from-purple-600/30 hover:to-pink-600/30 border border-purple-500/30 text-purple-300 py-3 rounded-xl transition duration-200 font-medium text-sm">
                <i class="fas fa-plus"></i> แชทใหม่
            </button>
        </div>
        <div class="px-4 py-3 text-xs text-gray-500 font-medium tracking-wide uppercase">ประวัติการสนทนา</div>
        <div id="chat-history-list" class="flex-1 overflow-y-auto px-2 pb-4 space-y-1">
            <!-- Injected dynamically -->
        </div>
        <div class="p-3 border-t border-gray-800/50 text-[10px] text-gray-600 text-center">
            judyboon AI · Powered by Gemini
        </div>
    </aside>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden" onclick="toggleSidebar()"></div>

    <!-- Main chat panel -->
    <main class="flex-1 flex flex-col min-w-0 bg-[#090d16] relative overflow-hidden">

        <!-- Header -->
        <header class="glass h-[60px] flex-shrink-0 flex items-center justify-between px-4 border-b border-gray-800/60 z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-800/50 text-gray-400 hover:text-white transition">
                    <i class="fas fa-bars text-lg"></i>
                </button>
                <div class="flex items-center gap-2.5">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center font-bold text-xs shadow-[0_0_15px_rgba(236,72,153,0.35)] border border-white/10 flex-shrink-0">AI</div>
                    <div>
                        <h1 class="font-semibold text-sm leading-tight">judyboon AI</h1>
                        <div class="flex items-center gap-1.5 text-[10px] text-emerald-400">
                            <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_5px_#34d399] animate-pulse"></div>
                            <span id="status-text">พร้อมช่วยเหลือ</span>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="clearCurrentChat()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-red-500/10 text-gray-500 hover:text-red-400 transition" title="ลบแชทนี้">
                <i class="fas fa-trash text-sm"></i>
            </button>
        </header>

        <!-- Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col gap-5 scroll-smooth">
            
            <!-- Welcome screen -->
            <div id="welcome-screen" class="flex flex-col items-center justify-center min-h-full my-auto text-center space-y-6 px-4 py-10">
                <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-pink-500 to-purple-600 p-[1.5px] shadow-[0_0_40px_rgba(168,85,247,0.35)]">
                    <div class="w-full h-full bg-[#0d1322] rounded-[22px] flex items-center justify-center border border-white/5">
                        <span class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-purple-400">AI</span>
                    </div>
                </div>
                <div>
                    <h2 class="text-xl md:text-2xl font-semibold mb-2 tracking-tight">สวัสดีครับ! ผมคือ judyboon AI</h2>
                    <p class="text-gray-400 text-sm max-w-md mx-auto leading-relaxed">
                        พิมพ์คำถามหรือแนบรูปภาพเพื่อเริ่มคุยกันได้เลยครับ<br>เปิดให้ใช้งานสำหรับทุกคนแล้ววันนี้
                    </p>
                </div>
                <div class="flex flex-wrap justify-center gap-2 md:gap-3">
                    <button onclick="fillInput('เขียนโค้ด HTML เกมจับคู่ภาพให้หน่อย')" class="px-4 py-2.5 bg-gray-800/50 hover:bg-gray-700/60 rounded-full text-sm border border-gray-700/60 transition hover:border-purple-500/40">📝 เขียนโค้ด</button>
                    <button onclick="fillInput('ช่วยเขียนเรียงความเรื่อง AI ในอนาคตให้หน่อย')" class="px-4 py-2.5 bg-gray-800/50 hover:bg-gray-700/60 rounded-full text-sm border border-gray-700/60 transition hover:border-purple-500/40">✍️ เขียนเรียงความ</button>
                    <button onclick="fillInput('อธิบายว่า Machine Learning คืออะไร แบบเข้าใจง่าย')" class="px-4 py-2.5 bg-gray-800/50 hover:bg-gray-700/60 rounded-full text-sm border border-gray-700/60 transition hover:border-purple-500/40">🤖 อธิบาย AI</button>
                </div>
            </div>

        </div>

        <!-- Input bar -->
        <div class="w-full glass border-t border-gray-800/80 p-3 md:p-4 flex-shrink-0 z-20">
            <div class="max-w-4xl mx-auto flex gap-2 items-end bg-[#111726]/80 rounded-2xl p-2 border border-gray-800/60 shadow-2xl focus-within:border-purple-500/50 transition-colors duration-200">
                
                <!-- Image upload -->
                <label class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl text-gray-500 hover:bg-gray-800/60 hover:text-white cursor-pointer transition" title="แนบรูป">
                    <i class="fas fa-image"></i>
                    <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                </label>

                <!-- Textarea + image preview -->
                <div class="flex-1 flex flex-col justify-center min-h-[40px]">
                    <div id="image-preview-container" class="hidden mb-2 mt-1 relative inline-block w-fit">
                        <img id="image-preview" src="" class="h-16 rounded-lg object-cover border border-gray-700 shadow-md">
                        <button onclick="removeImage()" class="absolute -top-2 -right-2 w-5 h-5 bg-red-500 rounded-full text-white text-[9px] flex items-center justify-center hover:bg-red-600 transition">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <textarea id="chat-input" rows="1" placeholder="พิมพ์ข้อความ..." 
                        class="w-full bg-transparent text-white outline-none resize-none py-2 text-sm md:text-base max-h-36 leading-relaxed"
                        oninput="autoResize(this)" 
                        onkeydown="handleEnter(event)"></textarea>
                </div>

                <!-- Send -->
                <button onclick="sendMessage()" id="send-btn" 
                    class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-[0_0_15px_rgba(236,72,153,0.4)] hover:opacity-90 transition active:scale-95 disabled:opacity-40 disabled:active:scale-100">
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
            <p class="text-center mt-2 text-[10px] text-gray-600">judyboon AI อาจแสดงข้อมูลที่ไม่ถูกต้อง โปรดตรวจสอบอีกครั้ง</p>
        </div>

    </main>
</div>

<script>
// ============================================================
//  CONFIG — API calls go through Vercel backend proxy
//  ไม่มี API key ฝั่ง client เด็ดขาด
// ============================================================
const API_ENDPOINT = '/api/chat';   // Vercel serverless function
const MODEL_NAME   = 'gemini-2.5-flash';

// ============================================================
//  STATE
// ============================================================
let currentImageBase64    = null;
let isSidebarOpen         = window.innerWidth >= 768;
let chatHistory           = JSON.parse(localStorage.getItem('judyboonChats_v2') || '[]');
let currentConversationId = null;

// ============================================================
//  DOM refs
// ============================================================
const sidebar               = document.getElementById('sidebar');
const sidebarOverlay        = document.getElementById('sidebar-overlay');
const chatMessages          = document.getElementById('chat-messages');
const welcomeScreen         = document.getElementById('welcome-screen');
const chatInput             = document.getElementById('chat-input');
const sendBtn               = document.getElementById('send-btn');
const imagePreviewContainer = document.getElementById('image-preview-container');
const imagePreview          = document.getElementById('image-preview');
const historyList           = document.getElementById('chat-history-list');

// ============================================================
//  INIT
// ============================================================
window.addEventListener('load', () => {
    renderHistory();
    if (chatHistory.length > 0) loadChat(chatHistory[0].id);
    else startNewChat();
    updateSidebarUI();
});

window.addEventListener('resize', updateSidebarUI);

// ============================================================
//  SIDEBAR
// ============================================================
function updateSidebarUI() {
    const isMobile = window.innerWidth < 768;
    if (isSidebarOpen) {
        sidebar.classList.remove('-translate-x-full');
        if (isMobile) sidebarOverlay.classList.remove('hidden');
        else sidebarOverlay.classList.add('hidden');
    } else {
        sidebar.classList.add('-translate-x-full');
        sidebarOverlay.classList.add('hidden');
    }
}

function toggleSidebar() {
    isSidebarOpen = !isSidebarOpen;
    updateSidebarUI();
}

// ============================================================
//  CHAT MANAGEMENT
// ============================================================
function startNewChat() {
    currentConversationId = Date.now().toString();
    // Remove all messages except welcome screen
    while (chatMessages.firstChild) chatMessages.removeChild(chatMessages.firstChild);
    chatMessages.appendChild(welcomeScreen);
    welcomeScreen.style.display = 'flex';
    renderHistory();
    if (window.innerWidth < 768 && isSidebarOpen) toggleSidebar();
}

function clearCurrentChat() {
    if (!currentConversationId) return;
    chatHistory = chatHistory.filter(c => c.id !== currentConversationId);
    saveHistory();
    renderHistory();
    startNewChat();
}

function fillInput(text) {
    chatInput.value = text;
    autoResize(chatInput);
    chatInput.focus();
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 144) + 'px';
}

function handleEnter(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

// ============================================================
//  IMAGE HANDLING
// ============================================================
function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        currentImageBase64 = e.target.result.split(',')[1];
        imagePreview.src = e.target.result;
        imagePreviewContainer.classList.remove('hidden');
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

function removeImage() {
    currentImageBase64 = null;
    imagePreview.src = '';
    imagePreviewContainer.classList.add('hidden');
}

// ============================================================
//  MARKDOWN — simple renderer (no external lib)
// ============================================================
function renderMarkdown(text) {
    let t = text
        // Code blocks
        .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // HR
        .replace(/^---$/gm, '<hr>')
        // H3
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        // H2
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        // H1
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Blockquote
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        // Unordered list items
        .replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>')
        // Ordered list items
        .replace(/^\s*\d+\. (.+)$/gm, '<li>$1</li>')
        // Wrap consecutive <li> in <ul>
        .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
        // Links
        .replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        // Line breaks (not inside pre)
        .replace(/\n/g, '<br>');

    // Don't add <br> inside pre blocks
    t = t.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (_, code) =>
        `<pre><code>${code.replace(/<br>/g, '\n')}</code></pre>`
    );
    return t;
}

// ============================================================
//  MESSAGE RENDERING
// ============================================================
function appendMessage(sender, text, imageSrc = null) {
    welcomeScreen.style.display = 'none';

    const msgDiv = document.createElement('div');
    msgDiv.className = `flex gap-3 ${sender === 'user' ? 'ml-auto flex-row-reverse max-w-[88%] md:max-w-2xl' : 'max-w-[92%] md:max-w-3xl'} fade-in`;

    const avatarHTML = sender === 'ai'
        ? `<div class="w-8 h-8 rounded-xl flex-shrink-0 bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center font-bold text-[10px] shadow-md mt-1 border border-white/10">AI</div>`
        : `<div class="w-8 h-8 rounded-xl flex-shrink-0 bg-gray-800 border border-gray-700 flex items-center justify-center text-xs shadow-md mt-1"><i class="fas fa-user text-gray-400"></i></div>`;

    let contentHTML = `<div class="flex flex-col gap-2 ${sender === 'user' ? 'items-end' : 'items-start'}">`;

    if (imageSrc) {
        contentHTML += `<img src="data:image/jpeg;base64,${imageSrc}" class="max-w-[200px] md:max-w-xs rounded-xl border border-gray-800 shadow-md">`;
    }

    if (text) {
        const bubbleBg    = sender === 'user' ? 'bg-[#1f283c] text-white border-gray-700/80' : 'bg-[#111726] text-gray-200 border-gray-800/80';
        const roundedClass = sender === 'user' ? 'rounded-2xl rounded-tr-sm' : 'rounded-2xl rounded-tl-sm';
        const content      = sender === 'ai' ? renderMarkdown(text) : text.replace(/\n/g, '<br>');
        contentHTML += `<div class="${bubbleBg} ${roundedClass} p-3 md:p-4 text-sm md:text-base border shadow-sm leading-relaxed msg-content" style="word-break:break-word;">${content}</div>`;
    }

    contentHTML += '</div>';
    msgDiv.innerHTML = sender === 'user' ? contentHTML + avatarHTML : avatarHTML + contentHTML;
    chatMessages.appendChild(msgDiv);
    setTimeout(() => { chatMessages.scrollTop = chatMessages.scrollHeight; }, 50);
}

function showTyping() {
    const div = document.createElement('div');
    div.id = 'typing-indicator';
    div.className = 'flex gap-3 max-w-[90%] md:max-w-3xl fade-in';
    div.innerHTML = `
        <div class="w-8 h-8 rounded-xl flex-shrink-0 bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center font-bold text-[10px] shadow-md mt-1 border border-white/10">AI</div>
        <div class="bg-[#111726] rounded-2xl rounded-tl-sm p-4 flex items-center gap-1.5 border border-gray-800/80 shadow-sm">
            <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay:0ms"></div>
            <div class="w-2 h-2 bg-pink-400 rounded-full animate-bounce" style="animation-delay:150ms"></div>
            <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay:300ms"></div>
        </div>`;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function hideTyping() {
    document.getElementById('typing-indicator')?.remove();
}

// ============================================================
//  SEND MESSAGE
// ============================================================
async function sendMessage() {
    const text        = chatInput.value.trim();
    const imageToSend = currentImageBase64;
    if (!text && !imageToSend) return;

    // Show user message
    appendMessage('user', text, imageToSend);
    chatInput.value = '';
    chatInput.style.height = 'auto';
    removeImage();
    sendBtn.disabled = true;

    // Save to history
    let conversation = chatHistory.find(c => c.id === currentConversationId);
    if (!conversation) {
        conversation = {
            id:       currentConversationId,
            title:    text ? text.substring(0, 35) + (text.length > 35 ? '…' : '') : 'ส่งรูปภาพ',
            messages: [],
            contents: []  // Gemini-format conversation history
        };
        chatHistory.unshift(conversation);
        renderHistory();
    }
    conversation.messages.push({ role: 'user', text, image: imageToSend });

    // Build Gemini contents (multi-turn)
    const parts = [];
    if (text) parts.push({ text });
    if (imageToSend) parts.push({ inline_data: { mime_type: 'image/jpeg', data: imageToSend } });
    if (!text && !imageToSend) parts.push({ text: 'อธิบายรูปภาพนี้ให้ฟังหน่อย' });
    conversation.contents.push({ role: 'user', parts });

    showTyping();
    try {
        const res = await fetch(API_ENDPOINT, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ contents: conversation.contents, model: MODEL_NAME })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || `Server error ${res.status}`);
        }

        const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text
            ?? 'ขออภัยครับ ไม่สามารถสร้างคำตอบได้';

        // Add AI reply to contents for next turn
        conversation.contents.push({ role: 'model', parts: [{ text: aiText }] });

        hideTyping();
        appendMessage('ai', aiText);
        conversation.messages.push({ role: 'ai', text: aiText });
        saveHistory();

    } catch (err) {
        hideTyping();
        let msg = err.message || 'เกิดข้อผิดพลาดที่ไม่ทราบสาเหตุ';
        if (msg.includes('Rate limit')) msg = '⏱️ ใช้งานเกินโควตา กรุณารอสักครู่แล้วลองใหม่';
        if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) msg = '🌐 ไม่สามารถเชื่อมต่อได้ กรุณาตรวจสอบอินเทอร์เน็ต';
        appendMessage('ai', `❌ **เกิดข้อผิดพลาด**\n\n${msg}`);
        // Remove failed user message from contents
        conversation.contents.pop();
    } finally {
        sendBtn.disabled = false;
        chatInput.focus();
    }
}

// ============================================================
//  HISTORY
// ============================================================
function saveHistory() {
    localStorage.setItem('judyboonChats_v2', JSON.stringify(chatHistory));
}

function renderHistory() {
    historyList.innerHTML = '';
    chatHistory.forEach(chat => {
        const btn = document.createElement('button');
        btn.className = `w-full text-left p-3 rounded-xl text-sm truncate transition-all duration-200 flex items-center justify-between group mb-0.5 ${
            chat.id === currentConversationId
                ? 'bg-purple-600/20 text-white border border-purple-500/30'
                : 'text-gray-400 hover:bg-gray-800/40 hover:text-gray-200 border border-transparent'
        }`;

        const titleSpan = document.createElement('span');
        titleSpan.className = 'truncate flex-1 text-left';
        titleSpan.innerText = chat.title;
        titleSpan.onclick = () => loadChat(chat.id);

        const delBtn = document.createElement('span');
        delBtn.className = 'opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 ml-2 p-1.5 rounded-md hover:bg-red-500/10 transition-all flex-shrink-0';
        delBtn.innerHTML = '<i class="fas fa-trash text-xs"></i>';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };

        btn.appendChild(titleSpan);
        btn.appendChild(delBtn);
        historyList.appendChild(btn);
    });
}

function loadChat(id) {
    const chat = chatHistory.find(c => c.id === id);
    if (!chat) return;

    currentConversationId = id;
    while (chatMessages.firstChild) chatMessages.removeChild(chatMessages.firstChild);
    chatMessages.appendChild(welcomeScreen);
    welcomeScreen.style.display = 'none';

    chat.messages.forEach(msg => appendMessage(msg.role, msg.text, msg.image));
    renderHistory();
    if (window.innerWidth < 768 && isSidebarOpen) toggleSidebar();
}

function deleteChat(id) {
    chatHistory = chatHistory.filter(c => c.id !== id);
    saveHistory();
    if (currentConversationId === id) startNewChat();
    else renderHistory();
}
</script>
</body>
</html>
